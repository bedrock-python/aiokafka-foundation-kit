name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # Trusted Publisher (PyPI OIDC)

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#aiokafka-foundation-kit-v}"
          echo "__version__ = \"$VERSION\"" > aiokafka_foundation_kit/__version__.py
      - run: uv build
      - run: uv publish
